services:
  mongo:
    image: mongo:7
    container_name: college-management-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: college-management-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/College-Management-System
      PORT: 4000
      FRONTEND_API_LINK: http://localhost:3000
      JWT_SECRET: THISISSECRET
      NODEMAILER_EMAIL: ""
      NODEMAILER_PASS: ""
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: college-management-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_APILINK: http://localhost:4000/api
      REACT_APP_MEDIA_LINK: http://localhost:4000/media
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: "0"
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  mongo-data:
  backend-node-modules:
  frontend-node-modules:
